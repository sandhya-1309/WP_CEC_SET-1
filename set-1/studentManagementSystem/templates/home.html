<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Management System</h1>
    <a href="{% url 'add' %}">Add Student</a>
    <table border='1'>
        <thead>
            <tr>
                <th>Name</th>
                <th>Enrollment Number</th>
                <th>Course</th>
                <th>Semester</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for student in data %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.enrollment_number }}</td>
                <td>{{ student.course }}</td>
                <td>{{ student.semester }}</td>
                <td>
                    <a href="{% url 'edit' id=student.id %}">Edit</a>
                    <a href="{% url 'delete' id=student.id %}" onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
